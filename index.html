<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESHU CODEX | 3D DATA BYPASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff41;
        }
        body { 
            background: #020617; 
            color: #e2e8f0; 
            font-family: 'Courier New', monospace; 
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* 3D Floating Particles Background */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        .header-glow {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 10px var(--neon-blue); }
            to { text-shadow: 0 0 30px var(--neon-green); color: var(--neon-green); }
        }

        /* 3D Card Style */
        .glass-3d {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Glowing Social Buttons */
        .btn-3d {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .btn-3d:hover { transform: translateZ(20px); }
        
        .wa { background: #25d366; box-shadow: 0 0 15px #25d366; }
        .tg { background: #0088cc; box-shadow: 0 0 15px #0088cc; }
        .ig { background: linear-gradient(45deg, #f09433, #e1306c); box-shadow: 0 0 15px #e1306c; }

        /* Permanent Floating TG */
        .float-tg {
            position: fixed;
            bottom: 30px; right: 30px;
            background: #0088cc;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px #0088cc;
            z-index: 9999;
            animation: hover 3s infinite ease-in-out;
        }
        @keyframes hover {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }

        /* Data Section Zoom-In */
        .section-appear {
            animation: zoomIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: translateZ(-100px) scale(0.8); }
            to { opacity: 1; transform: translateZ(0) scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div class="particles"></div>

    <div class="text-center mt-10 mb-12">
        <h1 class="header-glow">ESHU CODEX</h1>
        <p class="text-blue-400 font-bold tracking-widest text-xs mt-2">CYBERSPACE DATA TERMINAL</p>
    </div>

    <div id="socials" class="flex flex-wrap justify-center gap-4 mb-10 w-full max-w-2xl">
        <a href="https://wa.me/584165280421" target="_blank" class="btn-3d wa px-8 py-3 rounded-xl text-white font-black flex items-center gap-2">
            <i class="fab fa-whatsapp"></i> WHATSAPP
        </a>
        <a href="https://t.me/eshucordex143" target="_blank" class="btn-3d tg px-8 py-3 rounded-xl text-white font-black flex items-center gap-2">
            <i class="fab fa-telegram"></i> TELEGRAM
        </a>
        <a href="https://www.instagram.com/eshucordex?igsh=MWsxMG9tajNlN2p0OA==" target="_blank" class="btn-3d ig px-8 py-3 rounded-xl text-white font-black flex items-center gap-2">
            <i class="fab fa-instagram"></i> INSTAGRAM
        </a>
    </div>

    <div class="glass-3d p-8 rounded-3xl w-full max-w-xl text-center" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.5">
        <i class="fas fa-microchip text-4xl text-green-400 mb-4"></i>
        <h2 class="text-green-400 font-bold mb-6 tracking-tighter">TARGET DATABASE ACCESS</h2>
        
        <input type="text" id="phoneInput" placeholder="Enter Number (e.g. +91 00000 00000)" 
            class="w-full bg-black/50 border-2 border-blue-500/50 rounded-xl px-6 py-4 text-white focus:outline-none focus:border-green-400 transition-all text-center text-xl mb-6">
        
        <button onclick="startExploit()" class="w-full bg-blue-600 hover:bg-green-500 text-white font-black py-4 rounded-xl shadow-lg transition-all transform active:scale-95">
            INITIALIZE BYPASS
        </button>
    </div>

    <div id="loader" class="hidden mt-12 text-center">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-blue-500"></div>
        <p class="text-blue-400 mt-4 font-bold animate-pulse">CRACKING ENCRYPTION...</p>
    </div>

    <div id="output" class="hidden mt-10 w-full max-w-3xl space-y-6 pb-24">
        </div>

    <a href="https://t.me/eshucordex143" target="_blank" class="float-tg">
        <i class="fab fa-telegram-plane text-3xl text-white"></i>
    </a>

    <script>
        // Initialize Tilt.js for any existing or new glass-3d elements
        function initTilt() {
            VanillaTilt.init(document.querySelectorAll(".glass-3d"), {
                max: 10,
                speed: 400,
                glare: true,
                "max-glare": 0.3,
            });
        }
        initTilt();

        async function startExploit() {
            const input = document.getElementById('phoneInput').value;
            const output = document.getElementById('output');
            const loader = document.getElementById('loader');
            const socials = document.getElementById('socials');

            // --- Sanitization Logic ---
            let cleanNum = input.replace(/\s+/g, '').replace(/-/g, '');
            if (cleanNum.startsWith('+91')) cleanNum = cleanNum.substring(3);
            else if (cleanNum.startsWith('91') && cleanNum.length > 10) cleanNum = cleanNum.substring(2);
            cleanNum = cleanNum.replace(/\D/g, '');

            if (cleanNum.length !== 10) {
                alert("SYSTEM ERROR: ENTER 10 DIGIT TARGET.");
                return;
            }

            socials.classList.add('hidden');
            loader.classList.remove('hidden');
            output.classList.add('hidden');
            output.innerHTML = '';

            try {
                // Pointing to your Vercel serverless function
                const response = await fetch(`/api/lookup?num=${cleanNum}`);
                const data = await response.json();

                if (data.result) {
                    render3DSections(data.result);
                }

                loader.classList.add('hidden');
                output.classList.remove('hidden');
            } catch (e) {
                loader.classList.add('hidden');
                socials.classList.remove('hidden');
                alert("CONNECTION TIMEOUT: DATABASE REJECTED PAYLOAD");
            }
        }

        function render3DSections(results) {
            const output = document.getElementById('output');
            
            // Logic to categorize sections
            const cats = {
                "OWNER": ["👑 SYSTEM OWNER", "ESHU CODEX", "🚀"],
                "NUMBERS": ["📱 LINKED NUMBERS", results.filter(l => l.includes('Mobile:')), "📲"],
                "ADDRESS": ["📍 PHYSICAL LOCATION", results.filter(l => l.includes('Address:')), "🌏"],
                "IDENTITY": ["🆔 DOCUMENT DATA", results.filter(l => l.includes('Document number:')), "🛡️"],
                "LOGINS": ["🔐 CREDENTIALS DETECTED", results.filter(l => l.includes('Email:') || l.includes('password:')), "🔥"],
                "NAME": ["👤 TARGET IDENTIFIED", results.filter(l => l.includes('Full name:')), "👤"],
                "METADATA": ["📊 SYSTEM METADATA", results.filter(l => !l.includes('---') && l.length > 5), "⚡"]
            };

            for (const [key, val] of Object.entries(cats)) {
                if (key === "OWNER") {
                    output.innerHTML += `
                        <div class="glass-3d p-6 rounded-2xl section-appear border-t-4 border-blue-500 text-center" data-tilt>
                            <h3 class="text-blue-400 font-black mb-2">${val[0]}</h3>
                            <p class="text-2xl text-white font-bold">${val[1]}</p>
                        </div>
                    `;
                    continue;
                }
                
                if (val[1].length > 0) {
                    const content = val[1].map(l => {
                        // Privacy Redaction for Aadhar
                        let d = l.replace(/Document number:\s*(\d{12})/, "Aadhar: [REDACTED BY ESHU]");
                        return `<p class="mb-2 text-sm text-slate-300">${val[2]} ${d}</p>`;
                    }).join('');

                    output.innerHTML += `
                        <div class="glass-3d p-6 rounded-2xl section-appear" data-tilt>
                            <h3 class="text-green-400 font-bold mb-4 border-b border-white/10 pb-2 uppercase tracking-widest">${val[0]}</h3>
                            <div class="space-y-1">${content}</div>
                        </div>
                    `;
                }
            }
            initTilt(); // Apply 3D tilt to new sections
        }
    </script>
</body>
  </html>
