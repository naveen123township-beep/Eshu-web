    <script>
        async function fetchData() {
            let input = document.getElementById('phoneInput').value;
            let cleanNum = input.replace(/\+91/g, '').replace(/\s+/g, '').replace(/\D/g, '');
            
            if (cleanNum.length < 10) {
                alert("Please enter a valid 10-digit number.");
                return;
            }

            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '<p style="text-align:center; color:var(--neon-green); animation: blink 1s infinite;">📡 CONNECTING TO ENCRYPTED SERVER... BYPASSING FIREWALL...</p>';

            const proxy = "https://corsproxy.io/?";
            const api1 = `https://paid.proportalx.workers.dev/number?key=my&num=${cleanNum}`;
            const api2 = `https://rootx-osint.in/?type=num&key=demohai&query=${cleanNum}`;

            try {
                // Try API 1
                let response = await fetch(proxy + encodeURIComponent(api1));
                let data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    displayResults(data.result);
                } else {
                    throw new Error("API 1 empty, switching...");
                }
            } catch (error) {
                console.log("API 1 failed, trying Backup API...");
                try {
                    // Try Backup API 2
                    let response = await fetch(proxy + encodeURIComponent(api2));
                    let data = await response.json();
                    
                    if (Array.isArray(data)) {
                        processBackupApi(data);
                    } else {
                        outputDiv.innerHTML = '<p style="color:red; text-align:center;">❌ No Data Found in Database.</p>';
                    }
                } catch (err) {
                    outputDiv.innerHTML = '<p style="color:red; text-align:center;">❌ CONNECTION FAILED: BOTH SERVERS DOWN.</p>';
                }
            }
        }

        // Logic for Backup API Structure
        function processBackupApi(data) {
            let formattedResults = [];
            data.forEach(obj => {
                // Ignore developer/expiry objects
                if (obj.developer || obj.expiry) return;

                if (obj.NAME) formattedResults.push(`Full name: ${obj.NAME}`);
                if (obj.fname) formattedResults.push(`father: ${obj.fname}`);
                if (obj.MOBILE) formattedResults.push(`Mobile: ${obj.MOBILE}`);
                if (obj.alt) formattedResults.push(`Mobile: ${obj.alt}`);
                if (obj.ADDRESS) formattedResults.push(`Address: ${obj.ADDRESS.replace(/!/g, ' ')}`);
                if (obj.id) formattedResults.push(`Document number: ${obj.id}`);
                if (obj.circle) formattedResults.push(`Circle: ${obj.circle}`);
            });
            displayResults(formattedResults);
        }

        function displayResults(results) {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = ''; 

            let sections = {
                phones: [],
                address: [],
                aadhar: [],
                credentials: [],
                names: [],
                fathers: [],
                others: []
            };

            results.forEach(line => {
                if (!line || line.includes("---")) return;
                
                let l = line.toLowerCase();
                if (l.includes("mobile:")) sections.phones.push(line);
                else if (l.includes("address:")) sections.address.push(line);
                else if (l.includes("document number:") || l.includes("aadhar:")) sections.aadhar.push(line);
                else if (l.includes("email:") || l.includes("password:")) sections.credentials.push(line);
                else if (l.includes("full name:") || l.includes("name:")) sections.names.push(line);
                else if (l.includes("father:")) sections.fathers.push(line);
                else if (line.length > 3) sections.others.push(line);
            });

            const createSection = (title, icon, items) => {
                if (items.length === 0) return '';
                // Remove duplicates in items
                let uniqueItems = [...new Set(items)];
                return `
                    <div class="section-card">
                        <div class="section-title">${icon} ${title}</div>
                        ${uniqueItems.map(i => `<p class="data-item">🚀 ${i}</p>`).join('')}
                    </div>
                `;
            };

            outputDiv.innerHTML = `
                <div class="section-card" style="border-color: #00f2ff; text-align:center; border-left:none; border-top:4px solid #00f2ff;">
                    <div class="section-title" style="justify-content: center;">👑 SYSTEM OWNER</div>
                    <p style="color:#00f2ff; font-weight:bold; font-size:1.2rem;">ESHU CODEX</p>
                </div>
                ${createSection('LINKED NUMBERS', '📱', sections.phones)}
                ${createSection('GEO-LOCATION ADDRESS', '📍', sections.address)}
                ${createSection('AADHAR NUMBER', '🆔', sections.aadhar)}
                ${createSection('EMAIL & ENCRYPTED PASSWORD', '🔐', sections.credentials)}
                ${createSection('FULL NAME', '👤', sections.names)}
                ${createSection('FATHER NAME', '👨', sections.fathers)}
                ${createSection('OTHER INFORMATION', '📊', sections.others)}
            `;
        }
    </script>
