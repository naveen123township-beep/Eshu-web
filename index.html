<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESHU CODEX | ROOTX OSINT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --green: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { font-size: 2.8rem; color: var(--green); text-shadow: 0 0 15px var(--green); margin: 35px 0; font-weight: bold; letter-spacing: 4px; }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid var(--neon); padding: 30px; border-radius: 12px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        input { width: 85%; padding: 15px; background: #000; border: 1px solid var(--green); color: var(--green); font-size: 1.2rem; text-align: center; margin-bottom: 20px; outline: none; border-radius: 5px; }
        .btn { background: var(--neon); color: #000; padding: 14px 35px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; width: 100%; font-size: 1rem; }
        .results { width: 95%; max-width: 800px; margin-top: 30px; padding-bottom: 60px; }
        .card { background: #0a0a0a; border: 1px solid #222; border-left: 5px solid var(--green); padding: 20px; margin-bottom: 15px; border-radius: 4px; animation: slideUp 0.4s ease; }
        .card-title { color: var(--neon); font-size: 1.1rem; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        .data-line { margin: 10px 0; color: #ccc; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .loader { color: var(--green); animation: blink 0.8s infinite; margin: 20px; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">ESHU CODEX</div>

    <div class="panel">
        <i class="fas fa-fingerprint" style="font-size: 2.5rem; color: var(--green); margin-bottom: 15px;"></i>
        <h2 style="margin-top:0; color: var(--neon);">ROOTX OSINT</h2>
        <input type="text" id="query" placeholder="ENTER MOBILE NUMBER">
        <button class="btn" onclick="fetchOsint()">Initialize Search</button>
    </div>

    <div id="output" class="results"></div>

    <script>
        async function fetchOsint() {
            const query = document.getElementById('query').value.trim();
            const output = document.getElementById('output');
            
            if (!query) { alert("Please enter a value"); return; }

            output.innerHTML = '<div class="loader" style="text-align:center;">📡 BYPASSING ENCRYPTION... EXTRACTING ROOTX RECORDS...</div>';

            // New API with Cache Buster and AllOrigins Proxy for xo.je
            const apiUrl = `https://rootx-osint.in/?type=num&key=demohai&query=${query}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}&t=${Date.now()}`;

            try {
                const response = await fetch(proxy);
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);

                output.innerHTML = ''; // Clear loader

                if (Array.isArray(data) && data.length > 0) {
                    data.forEach((record, index) => {
                        // Skip the developer info objects, only show records with names/numbers
                        if (record.NAME || record.MOBILE) {
                            renderCard(record, index + 1);
                        }
                    });
                } else {
                    output.innerHTML = '<p style="color:red; text-align:center;">❌ NO RECORDS FOUND IN ROOTX DATABASE.</p>';
                }
            } catch (err) {
                console.error(err);
                output.innerHTML = '<p style="color:red; text-align:center;">❌ CONNECTION ERROR: API ACCESS DENIED BY HOST.</p>';
            }
        }

        function renderCard(record, count) {
            const output = document.getElementById('output');
            const card = document.createElement('div');
            card.className = 'card';
            
            // Format address: replace "!" with ", " for better readability
            const cleanAddress = record.ADDRESS ? record.ADDRESS.replace(/!/g, ', ') : 'N/A';

            card.innerHTML = `
                <div class="card-title">👤 RECORD #${count} | ${record.NAME || 'UNKNOWN'}</div>
                <div class="data-line">📱 <b>MOBILE:</b> ${record.MOBILE || 'N/A'}</div>
                <div class="data-line">👨‍💼 <b>FATHER:</b> ${record.fname || 'N/A'}</div>
                <div class="data-line">📍 <b>ADDRESS:</b> ${cleanAddress}</div>
                <div class="data-line">🌐 <b>CIRCLE:</b> ${record.circle || 'N/A'}</div>
                <div class="data-line">📞 <b>ALT NUM:</b> ${record.alt || 'N/A'}</div>
                <div class="data-line">🆔 <b>DOC ID:</b> ${record.id || 'N/A'}</div>
            `;
            output.appendChild(card);
        }
    </script>
</body>
</html>
