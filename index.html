<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Lookup Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Information Lookup</h1>
            <p class="text-slate-400">Developed by @Eshucording</p>
        </div>

        <!-- Input Box -->
        <div class="glass p-6 rounded-2xl shadow-xl mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="phoneInput" placeholder="Enter Mobile Number (e.g. +91 80956 80694)" 
                    class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="fetchData()" id="btn" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-lg font-semibold transition-all">
                    Search
                </button>
            </div>
        </div>

        <!-- Results Area -->
        <div id="loading" class="hidden flex justify-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
        </div>

        <div id="resultCard" class="hidden glass rounded-2xl p-6 shadow-2xl animate-in fade-in duration-500">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-4">
                <span class="text-blue-400 font-mono text-sm">Developer: @Eshucording</span>
                <span class="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded">Success</span>
            </div>
            <div id="dataContent" class="space-y-2 font-mono text-sm text-slate-300">
                <!-- Data will be injected here -->
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const input = document.getElementById('phoneInput').value;
            const content = document.getElementById('dataContent');
            const card = document.getElementById('resultCard');
            const loader = document.getElementById('loading');
            
            // 1. Sanitize: Remove +91, spaces, and non-digits
            let cleanNum = input.replace(/\D/g, ''); // Remove all non-numeric characters
            if (cleanNum.startsWith('91') && cleanNum.length > 10) {
                cleanNum = cleanNum.substring(2); // Remove leading 91
            }

            if (cleanNum.length < 10) {
                alert("Please enter a valid 10-digit number.");
                return;
            }

            // UI Reset
            card.classList.add('hidden');
            loader.classList.remove('hidden');
            content.innerHTML = '';

            try {
                const response = await fetch(`https://paid.proportalx.workers.dev/number?key=my&num=${cleanNum}`);
                const data = await response.json();

                // 2. Filter and Replace Data
                const results = data.result.filter(line => line.trim() !== "" && !line.includes('---'));
                
                results.forEach(line => {
                    const div = document.createElement('div');
                    div.className = "p-2 border-b border-slate-800 last:border-0";
                    div.innerText = line;
                    content.appendChild(div);
                });

                loader.classList.add('hidden');
                card.classList.remove('hidden');

            } catch (error) {
                loader.classList.add('hidden');
                alert("Error fetching data. Make sure the API is active.");
            }
        }
    </script>
</body>
</html>
