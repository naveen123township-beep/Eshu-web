<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Data Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: sans-serif; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
        
        /* Preformatted text block styling to prevent any interface lag */
        .raw-display {
            background: #090d16;
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 pt-12">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-blue-500 tracking-wider">INFORMATION LOOKUP</h1>
        <p class="text-slate-400 text-xs font-mono mt-1">Raw Stream Integration Panel</p>
    </div>

    <div class="max-w-xl w-full">
        <div class="glass p-6 rounded-3xl shadow-2xl mb-6">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="userInput" placeholder="Enter search parameter..." 
                    class="flex-1 bg-slate-900/80 border border-slate-700 rounded-xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white font-mono text-sm">
                <button onclick="sendApiQuery()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold transition-transform active:scale-95 shadow-lg">
                    SEARCH
                </button>
            </div>
        </div>

        <div id="loadingArea" class="hidden flex flex-col items-center py-12">
            <div class="loader rounded-full border-4 border-slate-800 h-10 w-10 mb-3"></div>
            <p class="text-blue-400 font-mono text-xs tracking-widest animate-pulse">REQUESTING DATA...</p>
        </div>

        <div id="displayCard" class="hidden glass rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-blue-600/10 border-b border-white/5 px-6 py-4 flex justify-between items-center">
                <span class="text-blue-400 font-bold text-xs font-mono tracking-widest">LIVE SERVER RESPONSE</span>
                <span class="text-emerald-400 text-[10px] font-mono">HTTP 200 OK</span>
            </div>
            
            <div class="p-4">
                <pre id="rawOutputBlock" class="raw-display p-4 rounded-2xl max-h-[500px] overflow-y-auto"></pre>
            </div>
            
            <button onclick="window.location.reload()" class="w-full py-4 bg-slate-900/80 text-xs text-slate-400 hover:text-white font-mono font-bold tracking-wide border-t border-white/5">
                RESET PANEL
            </button>
        </div>
    </div>

    <script>
        async function sendApiQuery() {
            const rawValue = document.getElementById('userInput').value.trim();
            const outputBlock = document.getElementById('rawOutputBlock');
            const displayCard = document.getElementById('displayCard');
            const loader = document.getElementById('loadingArea');
            
            // Clean up string values cleanly
            const cleanQuery = rawValue.replace(/\D/g, '');

            if (cleanQuery.length === 0) {
                alert("Please enter a valid search target parameter.");
                return;
            }

            // Reset UI Visibility states
            displayCard.classList.add('hidden');
            loader.classList.remove('hidden');
            outputBlock.textContent = '';

            try {
                // Point directly to the Vercel internal API function path
                const response = await fetch(`/api/lookup?num=${cleanQuery}`);
                const dataPayload = await response.json();

                // Convert the raw response object directly into string data text layout
                outputBlock.textContent = JSON.stringify(dataPayload, null, 2);
                
                loader.classList.add('hidden');
                displayCard.classList.remove('hidden');
            } catch (error) {
                loader.classList.add('hidden');
                alert("Error: Failed to fetch. The API might be down or blocked.");
                console.error("Fetch Exception: ", error);
            }
        }
    </script>
</body>
</html>
