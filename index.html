    <script>
        async function fetchData() {
            let input = document.getElementById('phoneInput').value;
            
            // AUTOMATIC SANITIZATION: Removes +91, spaces, and non-digits
            let cleanNum = input.replace(/\s+/g, ''); // Remove spaces

            else if (cleanNum.startsWith('91') && cleanNum.length > 10) cleanNum = cleanNum.substring(2);
            cleanNum = cleanNum.replace(/\D/g, ''); // Remove any other non-digits

            if (cleanNum.length < 10) {
                alert("⚠️ ALERT: TARGET NUMBER MUST BE 10 DIGITS.");
                return;
            }

            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '<div style="text-align:center; padding: 40px;"><p style="color:var(--neon-green); font-weight:bold; animation: blink 0.8s infinite;">📡 INJECTING PAYLOAD... BYPASSING SECURITY... ESHU CODEX ONLINE...</p></div>';

            // CORS Proxy + API
            const proxy = "https://api.allorigins.win/get?url=";
            const apiUrl = `https://paid.proportalx.workers.dev/number?key=my&num=${cleanNum}`;

            try {
                const response = await fetch(proxy + encodeURIComponent(apiUrl));
                const blob = await response.json();
                const data = JSON.parse(blob.contents); // AllOrigins returns data in .contents
                
                if (data.result && data.result.length > 0) {
                    displayResults(data.result);
                } else {
                    outputDiv.innerHTML = '<p style="color:#ff4444; text-align:center; padding: 20px; border: 1px solid #ff4444; border-radius: 10px;">❌ ACCESS DENIED: NO RECORDS FOUND IN DATABASE.</p>';
                }

                console.error(error);
                outputDiv.innerHTML = '<p style="color:#ff4444; text-align:center; padding: 20px; border: 1px solid #ff4444; border-radius: 10px;">❌ CONNECTION ERROR: FIREWALL BLOCKED REQUEST.<br>Check API status or Network.</p>';
            }
        }

        function displayResults(results) {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = ''; 

            let sections = {
                phones: [],
                address: [],
                aadhar: [],
                credentials: [],
                names: [],
                fathers: [],
                others: []
            };

            results.forEach(line => {
                if (!line || line.trim() === "" || line.includes("---") || line.includes("@proportalx")) return;
                
                let lower = line.toLowerCase();
                if (lower.includes("mobile:")) sections.phones.push(line);
                else if (lower.includes("address:")) sections.address.push(line);
                else if (lower.includes("document number:")) sections.aadhar.push(line);
                else if (lower.includes("email:") || lower.includes("password:")) sections.credentials.push(line);
                else if (lower.includes("full name:")) sections.names.push(line);
                else if (lower.includes("father:")) sections.fathers.push(line);
                else sections.others.push(line);
            });

            const createSection = (title, icon, items) => {
                if (items.length === 0) return '';
                return `
                    <div class="section-card">
                        <div class="section-title">${icon} ${title}</div>
                        ${items.map(i => {
                            // Redacting Aadhaar digits for safety while keeping the label
                            let display = i.replace(/Document number:\s*(\d{12})/, "Aadhar number: [Redacted for Privacy]");
                            return `<p class="data-item"><span>🚀</span> ${display}</p>`;
                        }).join('')}
                    </div>
                `;
            };

            outputDiv.innerHTML = `

                    </div>
                </div>

                ${createSection('LINKED NUMBERS', '📱', sections.phones)}
                ${createSection('GEO-LOCATION ADDRESS', '📍', sections.address)}
                ${createSection('AADHAR NUMBER', '🆔', sections.aadhar)}
                ${createSection('EMAIL & ENCRYPTED PASSWORDS', '🔐', sections.credentials)}
                ${createSection('FULL TARGET NAME', '👤', sections.names)}
                ${createSection('FATHER/OWNER NAME', '👨', sections.fathers)}
