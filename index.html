<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            color: #94a3b8;
            font-family: 'Fira Code', monospace;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }
        .shiny-text {
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .hack-input {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid #3b82f6;
            box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.1);
        }
        .section-header {
            border-left: 4px solid #3b82f6;
            padding-left: 10px;
            margin-bottom: 15px;
            background: rgba(59, 130, 246, 0.05);
        }
        .floating-tg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-4xl mx-auto">

            <p class="text-blue-400 font-bold tracking-widest text-xs uppercase">Advanced OSINT Intelligence Terminal</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <a href="https://www.instagram.com/eshucordex?igsh=MWsxMG9tajNlN2p0OA==" target="_blank" class="flex items-center justify-center gap-2 bg-gradient-to-r from-purple-600 to-pink-600 hover:scale-105 transition-transform text-white font-bold py-3 rounded-xl shadow-lg">
                📸 INSTAGRAM
            </a>
            <a href="https://t.me/eshucordex143" target="_blank" class="flex items-center justify-center gap-2 bg-blue-600 hover:scale-105 transition-transform text-white font-bold py-3 rounded-xl shadow-lg">
                ✈️ TELEGRAM
            </a>
            <a href="https://wa.me/584165280421" target="_blank" class="flex items-center justify-center gap-2 bg-green-600 hover:scale-105 transition-transform text-white font-bold py-3 rounded-xl shadow-lg">

        <div class="glass-panel p-6 rounded-3xl mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="phoneInput" placeholder="Enter target number..." 
                    class="hack-input flex-1 rounded-xl px-6 py-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
                <button onclick="runExploit()" class="bg-blue-700 hover:bg-blue-600 text-white font-black px-10 py-4 rounded-xl shadow-blue-900/50 shadow-xl transition-all active:scale-95">
                    INITIATE SEARCH
                </button>

        </div>

        <div id="loader" class="hidden text-center py-10">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
            <p class="mt-4 text-blue-400 font-bold animate-pulse">BYPASSING FIREWALLS... BY ESHU CODEX</p>
        </div>

        <div id="output" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-10 duration-700">
            
            <div class="glass-panel p-6 rounded-2xl">

                <div class="grid grid-cols-1 gap-2 text-sm">
                    <p class="text-white"><span class="text-blue-500">System:</span> ESHU CODEX</p>
                    <p class="text-white"><span class="text-blue-500">Access Level:</span> Administrator</p>
                    <p class="text-white"><span class="text-blue-500">Dev Telegram:</span> @eshucordex143</p>
                </div>
            </div>

            <div id="apiResults" class="space-y-6">
                </div>
        </div>
    </div>

    <a href="https://t.me/eshucordex143" class="floating-tg bg-blue-500 p-4 rounded-full shadow-2xl shadow-blue-500/50 z-50">
        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.14-.26.26-.53.26l.213-3.03 5.518-4.98c.24-.21-.054-.327-.376-.114L6.4 12.72l-2.94-.92c-.64-.2-.65-.64.13-.95l11.5-4.43c.53-.19 1 .13.804.801z"/></svg>
    </a>

    <script>
        async function runExploit() {
            const input = document.getElementById('phoneInput').value;
            const loader = document.getElementById('loader');
            const output = document.getElementById('output');
            const apiResults = document.getElementById('apiResults');

            // --- Sanitization Logic ---
            let cleanNum = input.replace(/\D/g, ''); 
            if (cleanNum.startsWith('91') && cleanNum.length > 10) {
                cleanNum = cleanNum.slice(-10);
            }

            if (cleanNum.length !== 10) {
                alert("⚠️ SYSTEM ERROR: Invalid Target Number (Must be 10 digits)");
                return;
            }

            loader.classList.remove('hidden');
            output.classList.add('hidden');
            apiResults.innerHTML = '';

            try {
                // Change this to your Vercel API path
                const response = await fetch(`/api/lookup?num=${cleanNum}`);
                const data = await response.json();

                if (data.result) {
                    renderSections(data.result);
                }

                loader.classList.add('hidden');
                output.classList.remove('hidden');
            } catch (e) {
                loader.classList.add('hidden');
                alert("❌ ACCESS DENIED: API Connection Failed");
            }
        }

        function renderSections(lines) {
            const apiResults = document.getElementById('apiResults');
            
            // Logic to categorize data based on keywords
            const categorized = {
                phones: lines.filter(l => l.includes('Mobile:')),
                address: lines.filter(l => l.includes('Address:')),
                docs: lines.filter(l => l.includes('Document number:')),
                emailPass: lines.filter(l => l.includes('Email:') || l.includes('password:')),
                name: lines.filter(l => l.includes('Full name:')),
                father: lines.filter(l => l.includes('father:')),
                others: lines.filter(l => l.includes('Region:') || l.includes('IP:') || l.includes('Currency:') || l.includes('registration:'))
            };

            const createSection = (title, emoji, content) => {
                if (content.length === 0) return '';
                return `
                    <div class="glass-panel p-6 rounded-2xl border-l-4 border-blue-500">
                        <h2 class="text-blue-400 font-bold uppercase mb-4">${emoji} ${title}</h2>
                        <div class="space-y-2 text-sm">
                            ${content.map(c => {
                                // Redact sensitive ID digits if they match Aadhaar length/format
                                let displayLine = c.replace(/Document number:\s*(\d{12})/, "Aadhar number: [Redacted for Privacy]");
                                return `<p class="text-slate-300"><span class="text-blue-500">➜</span> ${displayLine}</p>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            };

            apiResults.innerHTML = `
                ${createSection('Linked Numbers', '📱', categorized.phones)}
                ${createSection('Physical Addresses', '📍', categorized.address)}
                ${createSection('Identity Documents', '🆔', categorized.docs)}
                ${createSection('Credentials Detected', '🔐', categorized.emailPass)}
                ${createSection('Target Name', '👤', categorized.name)}
                ${createSection('Parental Details', '👴', categorized.father)}
                ${createSection('System Metadata', '🌐', categorized.others)}
            `;
        }
    </script>
</body>
