<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Lookup | @Eshucording</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.8s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-white mb-2">Information <span class="text-blue-500">Lookup</span></h1>
            <p class="text-slate-400">Developed by <span class="text-blue-400">@Eshucording</span></p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl mb-8">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="phoneInput" placeholder="Enter Number (+91...)" 
                    class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold transition-all transform active:scale-95">
                    Search
                </button>
            </div>
        </div>

        <div id="loading" class="hidden flex flex-col items-center py-12">
            <div class="loader rounded-full border-4 border-slate-800 h-12 w-12 mb-4"></div>
            <p class="text-slate-400">Accessing Database...</p>
        </div>

        <div id="resultCard" class="hidden glass rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-blue-600/10 border-b border-white/5 px-6 py-4 flex justify-between items-center">
                <span class="text-blue-400 font-bold text-xs uppercase">Search Result</span>
                <span class="text-slate-500 text-[10px]">Verified: @Eshucording</span>
            </div>
            <div id="dataContent" class="p-6 space-y-3 font-mono text-sm text-slate-300"></div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const input = document.getElementById('phoneInput').value;
            const content = document.getElementById('dataContent');
            const card = document.getElementById('resultCard');
            const loader = document.getElementById('loading');
            
            // 1. Sanitize Input (Remove +91, spaces, dashes)
            let cleanNum = input.replace(/\D/g, ''); 
            if (cleanNum.length > 10 && (cleanNum.startsWith('91'))) {
                cleanNum = cleanNum.slice(-10); // Keep only the last 10 digits
            }

            if (cleanNum.length !== 10) {
                alert("Enter a valid 10-digit number.");
                return;
            }

            card.classList.add('hidden');
            loader.classList.remove('hidden');
            content.innerHTML = '';

            try {
                // 2. Call your internal Vercel API
                const response = await fetch(`/api/lookup?num=${cleanNum}`);
                const data = await response.json();

                if (data.result && data.result.length > 0) {
                    data.result.forEach(line => {
                        if (line.trim() !== "" && !line.includes('---') && !line.includes('@proportalx')) {
                            const div = document.createElement('div');
                            div.className = "border-b border-white/5 pb-2 last:border-0";
                            div.innerHTML = `<span class="text-blue-500 mr-2">❯</span>${line}`;
                            content.appendChild(div);
                        }
                    });
                    loader.classList.add('hidden');
                    card.classList.remove('hidden');
                } else {
                    alert("No data found for this number.");
                    loader.classList.add('hidden');
                }
            } catch (error) {
                loader.classList.add('hidden');
                alert("Connection Error. Check API status.");
            }
        }
    </script>
</body>
  </html>
